      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-card {
        background: rgba(33, 43, 53, 0.4);

        background: radial-gradient(circle at center, rgba(112, 255, 225, 0.05) 0%, transparent 70%);
      }

<body class="bg-surface text-on-surface font-body min-h-screen selection:bg-primary-container selection:text-on-primary-container overflow-hidden relative">
<!-- Background Light Leaks / Radial Glows -->
<div class="fixed top-[-10%] right-[-5%] w-[500px] h-[500px] kinetic-glow pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-5%] w-[600px] h-[600px] kinetic-glow pointer-events-none"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center min-h-screen px-6">
<!-- Header / Logo Area -->
<header class="mb-10 text-center">
<div class="flex items-center justify-center gap-2 mb-3">
<span class="material-symbols-outlined text-primary-container text-4xl" data-icon="waves">waves</span>
<h1 class="text-4xl font-brand font-extrabold tracking-tighter text-on-surface">LiquidArc</h1>
</div>
<p class="font-headline text-on-surface-variant tracking-tight text-sm uppercase font-medium">The Institutional-Grade DeFi Portfolio Tracker</p>
</header>
<!-- Login Container -->
<div class="w-full max-w-[420px]">
<div class="glass-card p-8 rounded-xl border border-outline-variant/20 shadow-2xl relative overflow-hidden">
<!-- Subtle Gradient Line at top -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-primary-container/40 to-transparent"></div>
<form class="space-y-6">
<!-- Email Input Group -->
<div class="space-y-2">
<label class="block text-xs font-headline font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="email">Corporate Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-primary-container transition-colors" data-icon="alternate_email">alternate_email</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-surface-container-lowest border border-outline-variant/20 rounded-lg text-on-surface font-body placeholder:text-outline/40 focus:outline-none focus:border-primary-container/50 focus:ring-2 focus:ring-primary-container/10 transition-all duration-300" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="block text-xs font-headline font-bold uppercase tracking-widest text-on-surface-variant" for="password">Security Key</label>
<a class="text-[10px] font-headline font-bold uppercase tracking-wider text-primary-fixed hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-primary-container transition-colors" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-surface-container-lowest border border-outline-variant/20 rounded-lg text-on-surface font-body placeholder:text-outline/40 focus:outline-none focus:border-primary-container/50 focus:ring-2 focus:ring-primary-container/10 transition-all duration-300" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Sign In Action -->
<div class="pt-2">
<button class="group relative w-full flex justify-center py-4 px-4 border border-transparent rounded-lg text-sm font-bold text-on-primary-container bg-primary-container hover:bg-primary-fixed-dim focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container active:scale-[0.98] transition-all duration-200" type="submit">
<span class="absolute left-0 inset-y-0 flex items-center pl-3">
<span class="material-symbols-outlined text-on-primary-container/50 group-hover:text-on-primary-container transition-colors" data-icon="login">login</span>
</span>
                            Sign In
                        </button>
</div>
</form>
<!-- Vault Status Meta -->
<div class="mt-8 flex items-center justify-between text-[10px] font-mono text-outline/50 border-t border-outline-variant/10 pt-6">
<div class="flex items-center gap-2">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-tertiary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-tertiary"></span>
</span>
<span>GATEWAY ACTIVE</span>
</div>
<span>ENC_AES_256_GCM</span>
</div>
</div>
<!-- Footer Links -->
<footer class="mt-8 text-center">
<p class="text-sm text-on-surface-variant/60">
                    New to the Vault? 
                    <a class="text-on-surface font-semibold hover:text-primary-container transition-colors ml-1" href="#">Create an Institutional Account</a>
</p>
<div class="mt-12 flex justify-center gap-8 text-[10px] font-headline font-bold uppercase tracking-[0.2em] text-outline/30">
<a class="hover:text-on-surface transition-colors" href="#">Security Audit</a>
<a class="hover:text-on-surface transition-colors" href="#">Privacy Protocol</a>
<a class="hover:text-on-surface transition-colors" href="#">Support</a>
</div>
</footer>
</div>
</main>

<div class="fixed top-1/2 left-[-100px] -translate-y-1/2 opacity-10 pointer-events-none">
